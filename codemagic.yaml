workflows:
  android-workflow:
    name: Expo Android APK Build
    max_build_duration: 60
    environment:
      node: 18
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo Prebuild (Generate native folders)
        script: npx expo prebuild --platform android
      - name: Build Android APK (Debug Mode)
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
