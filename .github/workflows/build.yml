name: Construir APK ONYX (Final Blindado)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compilación APK
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar Código
        uses: actions/checkout@v4

      - name: 2. Configurar Entorno
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Instalación de Herramientas
        run: |
          npm install --legacy-peer-deps
          npm install -g expo-cli eas-cli

      - name: 4. 🚨 GENERAR ASSETS SINTÉTICOS (Anti-Error)
        run: |
          mkdir -p assets
          # Generamos imágenes PNG válidas usando un servicio dummy estable
          # Icono cuadrado 1024x1024
          curl -L -o assets/icon.png "https://dummyimage.com/1024x1024/000000/ff0000.png&text=ONYX"
          # Icono adaptativo
          cp assets/icon.png assets/adaptive-icon.png
          # Pantalla de carga (Splash) vertical
          curl -L -o assets/splash.png "https://dummyimage.com/1242x2436/000000/ff0000.png&text=ONYX+LOADING"
          # Favicon pequeño
          curl -L -o assets/favicon.png "https://dummyimage.com/48x48/000000/ff0000.png"
          
          # Verificar que pesan algo (no son archivos vacíos)
          ls -lh assets/

      - name: 5. Generar Carpetas Nativas
        run: npx expo prebuild --platform android --clean

      - name: 6. Compilar APK (Debug)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 7. Subir APK Terminado
        uses: actions/upload-artifact@v4
        with:
          name: ONYX-APK-FINAL
          path: android/app/build/outputs/apk/debug/app-debug.apk
