name: Construir APK ONYX (Blindado)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compilación Limpia Android
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar Código
        uses: actions/checkout@v4

      - name: 2. Configurar Entorno (Node & Java)
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Limpieza Nuclear de Dependencias
        run: |
          rm -rf node_modules
          rm -f package-lock.json
          npm install --legacy-peer-deps

      - name: 4. Instalar CLI de Expo Globalmente
        run: npm install -g expo-cli eas-cli

      - name: 5. Generar Carpetas Nativas (Prebuild)
        run: npx expo prebuild --platform android --clean

      - name: 6. Dar Permisos al Compilador
        run: chmod +x android/gradlew

      - name: 7. Compilar APK (Debug)
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: 8. Subir APK Terminado
        uses: actions/upload-artifact@v4
        with:
          name: ONYX-APK-FINAL
          path: android/app/build/outputs/apk/debug/app-debug.apk
