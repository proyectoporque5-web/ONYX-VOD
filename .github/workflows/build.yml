name: Construir APK ONYX PRODUCCIÓN V10

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Compilación Release (Independiente)
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar Código
        uses: actions/checkout@v4

      - name: 2. Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 4. Instalación Segura
        run: |
          npm cache clean --force
          npm install --legacy-peer-deps
          npm install -g expo-cli eas-cli

      - name: 5. Generar Assets de Emergencia
        run: |
          mkdir -p assets
          curl -L "https://dummyimage.com/1024x1024/000000/ff0000.png&text=ONYX" > assets/icon.png
          cp assets/icon.png assets/adaptive-icon.png
          curl -L "https://dummyimage.com/1242x2436/000000/ff0000.png&text=LOADING" > assets/splash.png
          curl -L "https://dummyimage.com/48x48/000000/ff0000.png" > assets/favicon.png

      - name: 6. Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: 7. 🚨 INYECTAR LLAVE MAESTRA EN GRADLE (El truco infalible)
        working-directory: android/app
        run: |
          # 1. Creamos la llave criptográfica directamente en la carpeta de Android
          keytool -genkey -v -keystore release.keystore -alias onyx-key -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Onyx" -storepass onyx1234 -keypass onyx1234
          
          # 2. Creamos el archivo de propiedades que Android lee automáticamente
          echo "storeFile=release.keystore" > keystore.properties
          echo "storePassword=onyx1234" >> keystore.properties
          echo "keyAlias=onyx-key" >> keystore.properties
          echo "keyPassword=onyx1234" >> keystore.properties

      - name: 8. Compilar APK (MODO PRODUCCIÓN)
        working-directory: android
        run: |
          chmod +x gradlew
          # assembleRelease empaquetará el código Javascript para que desaparezca la pantalla roja
          # Además, leerá el keystore.properties del paso 7 y firmará la app sola
          ./gradlew assembleRelease -x lint --stacktrace

      - name: 9. Subir APK Listo para Instalar
        uses: actions/upload-artifact@v4
        with:
          name: ONYX-APP-PRODUCCION
          path: android/app/build/outputs/apk/release/app-release.apk
