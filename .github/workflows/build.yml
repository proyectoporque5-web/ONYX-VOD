name: Construir APK ONYX FINAL (PRODUCCIÓN)

on:
  workflow_dispatch:
  push:
    branches:[ main, master ]

jobs:
  build:
    name: Compilación de Producción
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar Código
        uses: actions/checkout@v4

      - name: 2. Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Configurar Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 4. Instalación de Dependencias
        run: |
          npm cache clean --force
          npm install --legacy-peer-deps
          npm install -g expo-cli eas-cli

      - name: 5. Generar Assets de Emergencia
        run: |
          mkdir -p assets
          curl -L "https://dummyimage.com/1024x1024/000000/ff0000.png&text=ONYX" > assets/icon.png
          cp assets/icon.png assets/adaptive-icon.png
          curl -L "https://dummyimage.com/1242x2436/000000/ff0000.png&text=LOADING" > assets/splash.png
          curl -L "https://dummyimage.com/48x48/000000/ff0000.png" > assets/favicon.png

      - name: 6. Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: 7. Compilar APK (MODO PRODUCCIÓN)
        working-directory: android
        run: |
          chmod +x gradlew
          # assembleRelease empaqueta todo el código DENTRO del APK
          ./gradlew assembleRelease -x lint --stacktrace

      - name: 8. Falsificación de Firma de Seguridad (Keystore)
        run: |
          cd android/app/build/outputs/apk/release
          
          # 1. Generamos una llave de seguridad falsa
          keytool -genkey -v -keystore onyx.keystore -alias onyx -keyalg RSA -keysize 2048 -validity 10000 -storepass onyx123 -keypass onyx123 -dname "CN=Onyx,O=Onyx,C=US"
          
          # 2. Buscamos el firmador de Android en la máquina
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -r | head -n 1)
          
          # 3. Detectamos el APK generado y lo firmamos
          APK_FILE=$(ls *.apk | head -n 1)
          $APKSIGNER sign --ks onyx.keystore --ks-pass pass:onyx123 --out ONYX-INDEPENDIENTE.apk $APK_FILE

      - name: 9. Subir APK Terminado
        uses: actions/upload-artifact@v4
        with:
          name: ONYX-APP-PRODUCCION
          path: android/app/build/outputs/apk/release/ONYX-INDEPENDIENTE.apk
