name: Construir APK ONYX (Reparación de Entorno)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: {node-version: 18}
      - uses: actions/setup-java@v4
        with: {distribution: 'zulu', java-version: '17'}

      - name: Instalación de herramientas
        run: |
          npm install --legacy-peer-deps
          npm install -g expo-cli eas-cli

      - name: Generar Assets
        run: |
          mkdir -p assets
          curl -L -o assets/icon.png "https://dummyimage.com/1024x1024/000000/ff0000.png&text=ONYX"
          cp assets/icon.png assets/adaptive-icon.png
          curl -L -o assets/splash.png "https://dummyimage.com/1242x2436/000000/ff0000.png&text=LOADING"
          curl -L -o assets/favicon.png "https://dummyimage.com/48x48/000000/ff0000.png"

      - name: Prebuild & Fix SDK Path
        run: |
          # Generamos carpetas nativas
          npx expo prebuild --platform android --clean
          
          # Inyección del SDK PATH obligatoria para Gradle (Solución de la Biblia)
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          
          # Ajuste de memoria para evitar el Error 137
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties

      - name: Compilar APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: ONYX-APK-FINAL
          path: android/app/build/outputs/apk/debug/app-debug.apk
