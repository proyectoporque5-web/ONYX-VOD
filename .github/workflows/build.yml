name: Construir APK ONYX (Operación Fénix)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compilación Blindada
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar Código
        uses: actions/checkout@v4

      - name: 2. Configurar Entorno (Java 17 es OBLIGATORIO)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 3. 🚨 REINICIO FORZADO DE DEPENDENCIAS
        run: |
          # 1. Borramos cualquier rastro de configuración corrupta
          rm -rf node_modules
          rm -f package-lock.json
          rm -rf android
          
          # 2. Instalamos EXPLICITAMENTE las versiones estables de SDK 50
          # Esto evita que la IA elija versiones que no existen
          npm install expo@^50.0.0 react-native@0.73.6 react@18.2.0 --save-exact
          
          # 3. Instalamos las herramientas críticas
          npm install -g expo-cli eas-cli
          
          # 4. Instalamos el resto de librerías alineándolas al SDK 50
          npx expo install expo-
